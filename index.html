<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Toss & Go Junk Removal | Lansing, MI</title>
  <meta
    name="description"
    content="Fast, affordable, and hassle-free junk removal in Lansing, MI and surrounding areas. Call or text Toss & Go Junk Removal for a free quote."
  />
  <style>
    :root{
      --green:#2ecc71;
      --green-dark:#23b861;
      --dark:#111827;
      --text:#4b5563;
      --light:#f7f8fa;
      --line:#e5e7eb;
      --white:#ffffff;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:var(--white);
      line-height:1.6;
    }
    a{text-decoration:none;color:inherit}
    .container{width:min(1120px, calc(100% - 32px));margin:0 auto;}
    header{
      position:sticky;top:0;z-index:1000;
      background:rgba(17,24,39,.96);
      border-bottom:1px solid rgba(255,255,255,.08);
    }
    .nav{
      display:flex;justify-content:space-between;align-items:center;
      padding:14px 0;
    }
    .brand{color:#fff;font-size:28px;font-weight:900;}
    .brand span{color:var(--green);}
    .btn{
      padding:12px 18px;border-radius:10px;font-weight:bold;
      display:inline-block;
    }
    .btn-primary{background:var(--green);color:#fff;}
    .btn-secondary{background:#fff;color:#111;border:1px solid #ddd;}
    .hero{
      background:#111;color:#fff;padding:60px 0;
    }
    .hero h1{font-size:42px;margin-bottom:10px;}
    .section{padding:60px 0;}
    .card{
      background:#fff;border:1px solid #ddd;border-radius:14px;padding:20px;
    }
    input, textarea{
      width:100%;padding:12px;margin:6px 0;
      border-radius:8px;border:1px solid #ccc;
    }
    footer{
      background:#111;color:#ccc;padding:30px 0;margin-top:40px;
    }
  </style>
</head>
<body>

<header>
  <div class="container nav">
    <div class="brand">Toss <span>&</span> Go</div>
    <div>
      <a class="btn btn-secondary" href="sms:5175255465">Text</a>
      <a class="btn btn-primary" href="tel:5175255465">Call</a>
    </div>
  </div>
</header>

<section class="hero">
  <div class="container">
    <h1>Junk Removal in Lansing, MI</h1>
    <p>Fast, affordable, and hassle-free junk removal services.</p>
    <a class="btn btn-primary" href="tel:5175255465">Call Now</a>
    <a class="btn btn-secondary" href="sms:5175255465">Text Photos</a>
  </div>
</section>

<section class="section">
  <div class="container">
    <h2>Get a Free Quote</h2>
    <div class="card">
      <form onsubmit="sendQuote(event)">
        <input type="text" id="name" placeholder="Name" required>
        <input type="text" id="phone" placeholder="Phone" required>
        <input type="email" id="email" placeholder="Email">
        <textarea id="details" placeholder="What do you need removed?"></textarea>
        <button class="btn btn-primary" type="submit">Submit</button>
      </form>
    </div>
  </div>
</section>

<footer>
  <div class="container">
    Toss & Go Junk Removal<br>
    Call or Text: (517) 525-5465
  </div>
</footer>

<script>
function sendQuote(event) {
  event.preventDefault();

  const name = document.getElementById('name').value || '';
  const phone = document.getElementById('phone').value || '';
  const email = document.getElementById('email').value || '';
  const details = document.getElementById('details').value || '';

  const subject = encodeURIComponent('Quote Request - Toss & Go Junk Removal');
  const body = encodeURIComponent(
    'Name: ' + name + '\\n' +
    'Phone: ' + phone + '\\n' +
    'Email: ' + email + '\\n\\n' +
    'Details:\\n' + details
  );

  window.location.href = 'mailto:info@tossandgojunkremoval.com?subject=' + subject + '&body=' + body;
}
</script>

</body>
</html>
